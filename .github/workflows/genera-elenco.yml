name: Genera elenco PDF

on:
  push:
    paths:
      - 'pdf/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Genera elenco PDF
      run: |
        echo "{" > elenco.json
        firstFolder=true
        for folder in pdf/*; do
          if [ -d "$folder" ]; then
            folderName=$(basename "$folder")

            if [ "$firstFolder" = true ]; then
              firstFolder=false
            else
              echo "," >> elenco.json
            fi

            echo -n "  \"${folderName}\": [" >> elenco.json

            firstFile=true
            for file in "$folder"/*.pdf; do
              if [ -f "$file" ]; then
                fileName=$(basename "$file")

                if [ "$firstFile" = true ]; then
                  firstFile=false
                else
                  echo -n ", " >> elenco.json
                fi

                # AGGIUNTA VIRGOLETTE
                echo -n "\"${fileName}\"" >> elenco.json
              fi
            done

            echo -n "]" >> elenco.json
          fi
        done

        echo "" >> elenco.json
        echo "}" >> elenco.json

    - name: Commit file elenco.json
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add elenco.json
        git commit -m "Aggiornato elenco PDF" || echo "Nessuna modifica"
        git push
