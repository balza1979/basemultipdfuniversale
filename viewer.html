<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Visualizzatore PDF</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<script>
// Legge il parametro ?file=...
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

// Percorso base automatico
const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");

// URL del PDF su Google Viewer
const pdfUrl = `https://docs.google.com/gview?embedded=1&url=${baseURL}/pdf/${file}`;

// Inserisce l'iframe CORRETTAMENTE
document.write(`${pdfUrl}</iframe>`);
</script>

</body>
</html>
