<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PDF</title>
</head>

<body>

./index.html⬅ Torna</a>

<h1 id="titolo"></h1>
<div id="pdf-container"></div>

<!-- iframe invisibile per il test sicurezza -->
<iframe id="testFrame" style="display:none;"></iframe>

<script>
// Leggo la cartella dalla URL
const p = new URLSearchParams(window.location.search);
const cart = p.get("cartella");

// Titolo dinamico
document.getElementById("titolo").innerHTML = "PDF in: " + cart;

// Percorso base dinamico (universale)
const base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
const load = base + "/loading.html";

// Carico elenco.json
fetch("elenco.json")
  .then(r => r.json())
  .then(data => {
    const arr = data[cart];
    const c = document.getElementById("pdf-container");

    arr.forEach(pdf => {
      const f = encodeURIComponent(pdf);
      const d = `${base}/pdf/${encodeURIComponent(cart)}/${f}`;
      const g = `https://docs.google.com/gview?embedded=1&url=${d}`;

      const div = document.createElement("div");
      div.innerHTML = `
        <b>${pdf}</b><br>
        <button onclick="window.open('${d}', '_blank')">Vedi/Scarica</button>
        <button onclick="safe('${d}', '${g}')">Vedi Online</button>
      `;
      c.appendChild(div);
    });
  });

// Funzione per caricare sicuro
function safe(d, g) {
  const t = window.open(load, "_blank");
  if (!t) return;

  const fr = document.getElementById("testFrame");
  fr.src = d;

  setTimeout(() => {
    let ok = false;
    try {
      ok = fr.contentWindow.location.href !== "about:blank";
    } catch (e) {}

    t.location.href = ok ? d : g;

  }, 5000);
}
</script>

</body>
</html>
