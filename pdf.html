<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PDF</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    background-image: url('sfondo-elmi-verticale.jpg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    min-height: 100vh;
  }

  .top-bar {
    position: fixed; top: 15px; left: 15px; right: 15px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 999;
  }

  .btn {
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
    padding: 14px 22px;
    color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: background-color 0.2s ease;
    font-size: 20px;
  }
  .btn-back { background-color: #0275d8; }
  .btn-back:hover { background-color: #025aa5; }
  .btn-home { background-color: #d9534f; }
  .btn-home:hover { background-color: #c9302c; }

  main {
    max-width: 900px;
    margin: 120px auto 40px auto;
    padding: 10px;
  }

  h1 {
    text-align: center;
    color: red;
    font-size: 48px;
    margin: 16px 0 8px 0;
  }

  .status {
    max-width: 900px;
    margin: 0 auto 16px auto;
    background: rgba(255,255,255,0.9);
    color: #333;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    white-space: pre-wrap;
  }

  .card {
    background: white;
    padding: 20px;
    margin: 15px auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .file-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    word-break: break-word;
    color: #111;
  }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .actions button {
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    color: white;
    font-weight: bold;
  }

  .btn-download { background-color: #28a745; }
  .btn-view { background-color: #007bff; }

  #testFrame { display: none; }
</style>
</head>
<body>

<div class="top-bar">
  ./index.html⬅ Torna</a>
  https://balza1979.github.io/Elmi-Documenti/Home</a>
</div>

<main>
  <h1 id="titolo">PDF</h1>
  <div id="status" class="status">Diagnostica in attesa…</div>
  <div id="pdf-container"></div>
</main>

<iframe id="testFrame"></iframe>

<script>
(function () {
  const statusBox = document.getElementById('status');
  const container = document.getElementById('pdf-container');

  function logStatus(msg) {
    console.log('[pdf.html]', msg);
    statusBox.textContent = String(msg);
  }

  const qs = new URLSearchParams(window.location.search);
  const cart = qs.get("cartella");
  document.getElementById("titolo").textContent = cart ? ("PDF in: " + cart) : "PDF";

  const base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
  const loadingURL = base + "/loading.html";

  const elencoUrl = "elenco.json?ts=" + Date.now();
  logStatus(`Caricamento: ${elencoUrl}\nCartella richiesta: ${cart || '(mancante)'}\nBase: ${base}`);

  fetch(elencoUrl)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      const keys = Object.keys(data || {});
      logStatus(`Caricato elenco.json OK\nChiavi trovate: ${keys.join(', ') || '(nessuna)'}\nCartella richiesta: ${cart}`);

      if (!cart) {
        // Nessun parametro cartella -> elenco chiavi cliccabili
        container.appendChild(buildKeysList(keys));
        return;
      }

      const arr = data[cart];
      if (!Array.isArray(arr)) {
        // Cartella non presente in elenco.json -> mostra elenco chiavi cliccabili
        const warn = document.createElement('div');
        warn.className = 'card';
        warn.style.color = 'red';
        warn.textContent = `La cartella "${cart}" non è presente in elenco.json. Scegli una delle cartelle esistenti qui sotto.`;
        container.appendChild(warn);
        container.appendChild(buildKeysList(keys));
        return;
      }

      if (arr.length === 0) {
        const info = document.createElement('div');
        info.className = 'card';
        info.textContent = `Nessun PDF nella cartella: ${cart}`;
        container.appendChild(info);
        return;
      }

      // Crea card per ogni PDF
      arr.forEach(pdf => {
        const direct = `${base}/pdf/${encodeURIComponent(cart)}/${encodeURIComponent(pdf)}`;
        const gview  = `https://docs.google.com/gview?embedded=1&url=${direct}`;

        const card = document.createElement('div');
        card.className = 'card';

        const title = document.createElement('div');
        title.className = 'file-title';
        title.textContent = pdf;

        const actions = document.createElement('div');
        actions.className = 'actions';

        const btnDownload = document.createElement('button');
        btnDownload.className = 'btn-download';
        btnDownload.textContent = 'Vedi/Scarica';
        btnDownload.addEventListener('click', () => window.open(direct, '_blank'));

        const btnView = document.createElement('button');
        btnView.className = 'btn-view';
        btnView.textContent = 'Vedi Online';
        btnView.addEventListener('click', () => openSafe(direct, gview));

        actions.appendChild(btnDownload);
        actions.appendChild(btnView);

        card.appendChild(title);
        card.appendChild(actions);
        container.appendChild(card);
      });
    })
    .catch(err => {
      logStatus(`ERRORE nel caricamento di elenco.json: ${err.message}\nVerifica che esista in root e che sia JSON valido.`);
      const info = document.createElement('div');
      info.className = 'card';
      info.style.color = 'red';
      info.textContent = 'Errore nel caricamento di elenco.json';
      container.appendChild(info);
    });

  // costruttore lista chiavi cliccabili
  function buildKeysList(keys) {
    const wrap = document.createElement('div');
    wrap.className = 'card';
    const title = document.createElement('div');
    title.className = 'file-title';
    title.textContent = 'Cartelle disponibili:';
    wrap.appendChild(title);

    if (!keys.length) {
      const p = document.createElement('p');
      p.textContent = 'Nessuna cartella trovata in /pdf oppure elenco.json è vuoto.';
      wrap.appendChild(p);
      return wrap;
    }

    const ul = document.createElement('ul');
    ul.style.margin = '0';
    ul.style.paddingLeft = '18px';

    keys.forEach(k => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = 'pdf.html?cartella=' + encodeURIComponent(k);
      a.textContent = k;
      li.appendChild(a);
      ul.appendChild(li);
    });

    wrap.appendChild(ul);
    return wrap;
  }

  function openSafe(direct, gview) {
    const w = window.open(loadingURL, '_blank');
    if (!w) return;

    const frame = document.getElementById('testFrame');
    frame.src = direct;

    setTimeout(() => {
      let ok = false;
      try { ok = frame.contentWindow.location.href !== 'about:blank'; }
      catch(e){ ok = false; }

      w.location.href = ok ? direct : gview;
    }, 5000);
  }
})();
</script>

</body>
</html>
