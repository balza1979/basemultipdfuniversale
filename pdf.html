<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PDF</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    color: red;
    font-size: 40px;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card button {
    margin-right: 10px;
    padding: 10px 20px;
    font-size: 18px;
}
</style>

</head>

<body>

./index.html⬅ Torna</a>

<h1 id="titolo"></h1>
<div id="pdf-container"></div>

<iframe id="testFrame" style="display:none;"></iframe>

<script>
const p = new URLSearchParams(window.location.search);
const cart = p.get("cartella");
document.getElementById("titolo").innerHTML = "PDF in: " + cart;

const base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
const load = base + "/loading.html";

fetch("elenco.json")
  .then(r => r.json())
  .then(data => {
    const arr = data[cart];
    const container = document.getElementById("pdf-container");

    arr.forEach(pdf => {
      const encoded = encodeURIComponent(pdf);
      const folder = encodeURIComponent(cart);

      const direct = `${base}/pdf/${folder}/${encoded}`;
      const gview = `https://docs.google.com/gview?embedded=1&url=${direct}`;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${pdf}</b><br><br>
        <button onclick="window.open('${direct}','_blank')">Vedi/Scarica</button>
        <button onclick="safe('${direct}', '${gview}')">Vedi Online</button>
      `;

      container.appendChild(div);
    });
  });

function safe(direct, gview) {
  const newTab = window.open(load, "_blank");
  if (!newTab) return;

  const frame = document.getElementById("testFrame");
  frame.src = direct;

  setTimeout(() => {
    let ok = false;
    try {
      ok = frame.contentWindow.location.href !== "about:blank";
    } catch (e) {}

    newTab.location.href = ok ? direct : gview;

  }, 5000);
}
</script>

</body>
</html>
