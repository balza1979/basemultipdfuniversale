<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PDF della Cartella</title>

<style>
body {
  font-family: Arial;
  background: black;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  padding: 40px;
}

h1 {
  text-align: center;
  color: red; 
  font-weight: bold;
  font-size: 26px;
}

.back-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #0275d8;
    color: white;
    padding: 20px 28px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: background-color 0.2s ease;
    z-index: 999;
    font-size: 26px;
}

.back-button:hover {
    background-color: #025aa5;
}

.card {
  background: grey;
  padding: 20px;
  margin: 15px auto;
  max-width: 850px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-title {
  font-size: 36px;
  font-weight: 700;
  color: black;
  max-width: 60%;
  word-break: break-word;
}

.button-column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card button {
  background: green;
  color: white;
  border: none;
  padding: 16px 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 22px;
  font-weight: 700;
  width: 220px;
}

.card button:hover {
  background: #0056b3;
}

#loadingPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px 50px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  font-size: 28px;
  font-weight: bold;
  display: none;
  z-index: 2000;
  text-align: center;
}

#loadingPopup span {
  display: block;
  margin-top: 15px;
  font-size: 22px;
  font-weight: normal;
}

#testFrame {
  display: none;
}
</style>
</head>

<body>

<a class="back-button" href="index.html">⬅ Torna Indietro</a>

<h1 id="titolo"></h1>
<div id="pdf-container"></div>

<div id="loadingPopup">
  ⏳ Caricamento del documento...
  <span id="loadingSub">Attendere qualche secondo</span>
</div>

<iframe id="testFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
const cartella = params.get("cartella");

document.getElementById("titolo").innerHTML =
    "PDF in: " + cartella + "<br>" +
    "DESCRIZIONE COMANDI:<br>"  +
    "SE PREMI 'Vedi/Scarica': apre o scarica in base al browser<br>" +
    "SE PREMI 'Vedi Online': visualizza sempre online (necessita circa 5 secondi per controlli)";

fetch("elenco.json")
  .then(r => r.json())
  .then(data => {

    const pdfs = data[cartella];
    const container = document.getElementById("pdf-container");

    pdfs.forEach(pdf => {

      const encodedName = encodeURIComponent(pdf);
      const encodedFolder = encodeURIComponent(cartella);

      // percorso RELATIVO universale
      const directUrl = `pdf/${encodedFolder}/${encodedName}`;

      const gviewUrl = `https://docs.google.com/gview?embedded=1&url=${window.location.origin}/${directUrl}`;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="card-title">📄 ${pdf}</div>
        <div class="button-column">
          <button onclick="openFast('${directUrl}')">Vedi/Scarica</button>
          <button onclick="openSafe('${directUrl}', '${gviewUrl}')">Vedi Online</button>
        </div>
      `;

      container.appendChild(card);
    });

  });

function openFast(url) {
  window.open(url, "_blank");
}

function openSafe(directUrl, gviewUrl) {

  const newTab = window.open("loading.html", "_blank");

  if (!newTab) return;

  showLoading(true, "Caricamento del documento...", "Attendere qualche secondo");

  const frame = document.getElementById("testFrame");
  frame.src = directUrl;

  setTimeout(() => {

    let loaded = false;

    try {
      loaded = frame.contentWindow.location.href !== "about:blank";
    } catch (e) {
      loaded = false;
    }

    showLoading(false);

    if (loaded) {
      newTab.location.href = directUrl;
    } else {
      newTab.location.href = gviewUrl;
    }

  }, 5000);
}

function showLoading(show, title = "", subtitle = "") {

  const popup = document.getElementById("loadingPopup");
  const sub = document.getElementById("loadingSub");

  popup.style.display = show ? "block" : "none";

  if (title) popup.childNodes[0].textContent = "⏳ " + title;
  if (subtitle) sub.textContent = subtitle;
}

</script>

</body>
</html>
